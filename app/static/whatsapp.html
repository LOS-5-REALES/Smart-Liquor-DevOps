<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel WhatsApp — Smart-Liquor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; height: 100vh; display: flex; flex-direction: column; }
  
  /* Header */
  .header { background: #0f1214; border-bottom: 1px solid #1a1d20; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-left h1 { font-size: 18px; color: white; }
  .header-left span { color: #25D366; font-size: 22px; }
  .header-left small { color: grey; font-size: 12px; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; }
  .btn-refresh { background: #1a1f26; color: white; margin-right: 8px; }
  .btn-back { background: #1a1f26; color: white; }
  .btn-send { background: #25D366; color: white; padding: 10px 20px; }
  .btn-devolver { background: #ff9800; color: white; font-size: 12px; padding: 6px 12px; display: none; }

  /* Layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Lista conversaciones */
  .conv-panel { width: 300px; background: #0f1214; border-right: 1px solid #1a1d20; display: flex; flex-direction: column; }
  .conv-header { padding: 12px; border-bottom: 1px solid #1a1d20; display: flex; align-items: center; gap: 8px; }
  .conv-header span { color: #25D366; }
  .conv-header h3 { flex: 1; font-size: 14px; }
  .conv-list { overflow-y: auto; flex: 1; padding: 8px; }
  .conv-item { background: #111416; border: 1px solid #1a1d20; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; display: flex; gap: 10px; align-items: center; }
  .conv-item:hover { background: #1a1f26; border-color: #2196f3; }
  .conv-item.active { background: #1a1f26; border-color: #2196f3; }
  .conv-item .avatar { font-size: 28px; color: #2196f3; }
  .conv-item .avatar.agente { color: #25D366; }
  .conv-info { flex: 1; min-width: 0; }
  .conv-info .nombre { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-info .tel { font-size: 10px; color: grey; }
  .conv-info .ultimo { font-size: 11px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { background: red; color: white; border-radius: 10px; padding: 2px 6px; font-size: 10px; font-weight: bold; }
  .badge-agente { background: #2a1a00; color: #ff9800; border: 1px solid #ff9800; border-radius: 4px; padding: 2px 5px; font-size: 9px; font-weight: bold; }

  /* Chat */
  .chat-panel { flex: 1; display: flex; flex-direction: column; padding: 16px; background: #0b0d0f; }
  .chat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .chat-header h2 { font-size: 15px; color: grey; }
  .chat-header h2.activo { color: white; }
  .chat-messages { flex: 1; background: #0f1214; border-radius: 10px; padding: 12px; overflow-y: auto; margin-bottom: 8px; }
  .msg { display: flex; margin-bottom: 8px; }
  .msg.agente { justify-content: flex-end; }
  .msg-bubble { max-width: 500px; padding: 8px 12px; border-radius: 10px; }
  .msg-bubble .label { font-size: 10px; font-weight: bold; margin-bottom: 4px; }
  .msg-bubble .fecha { font-size: 10px; color: #555; margin-left: 8px; }
  .msg-bubble .texto { font-size: 13px; color: white; }
  .msg-bubble.cliente { background: #16191c; }
  .msg-bubble.bot { background: #1a1f26; }
  .msg-bubble.agente { background: #1a2a1a; }
  .label.cliente { color: #fbbf24; }
  .label.bot { color: #2196f3; }
  .label.agente { color: #66bb6a; }
  .chat-input { display: flex; gap: 8px; align-items: flex-end; }
  .chat-input textarea { flex: 1; background: #111416; border: 1px solid #232629; border-radius: 10px; color: white; padding: 10px; font-size: 13px; resize: none; min-height: 60px; font-family: inherit; }
  .chat-input textarea:focus { outline: none; border-color: #25D366; }
  .status { font-size: 12px; margin-top: 6px; color: green; min-height: 18px; }
  .loading { color: grey; font-style: italic; padding: 20px; text-align: center; }

  @media (max-width: 700px) {
    .conv-panel { width: 100%; display: none; }
    .conv-panel.show { display: flex; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span>💬</span>
    <div>
      <h1>Panel WhatsApp</h1>
      <small>Smart-Liquor</small>
    </div>
  </div>
  <div>
    <button class="btn btn-refresh" onclick="cargarConversaciones()">🔄 Actualizar</button>
    <button class="btn btn-back" onclick="window.location.href='/'">← Dashboard</button>
  </div>
</div>

<div class="main">
  <!-- Lista conversaciones -->
  <div class="conv-panel" id="convPanel">
    <div class="conv-header">
      <span>💬</span>
      <h3>Conversaciones</h3>
      <button class="btn btn-refresh" style="padding:4px 8px;font-size:11px;" onclick="cargarConversaciones()">🔄</button>
    </div>
    <div class="conv-list" id="convList">
      <div class="loading">Cargando...</div>
    </div>
  </div>

  <!-- Chat activo -->
  <div class="chat-panel">
    <div class="chat-header">
      <h2 id="chatTitle">Selecciona una conversación</h2>
      <div id="badgeAgente" style="display:none; background:#2a1a00; border:1px solid #ff9800; border-radius:6px; padding:4px 10px; font-size:12px; color:#ff9800;">👤 Modo Agente Activo</div>
      <button class="btn btn-devolver" id="btnDevolver" onclick="devolverAlBot()">🤖 Devolver al Bot</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="loading">Selecciona una conversación para ver los mensajes</div>
    </div>
    <div class="chat-input">
      <textarea id="inputRespuesta" placeholder="Escribe tu respuesta al cliente..." rows="2"></textarea>
      <button class="btn btn-send" onclick="enviarMensaje()">Enviar ➤</button>
    </div>
    <div class="status" id="statusMsg"></div>
  </div>
</div>

<script>
  let telefonoActivo = null;
  let nombreActivo = null;
  let autoRefreshInterval = null;

  async function cargarConversaciones() {
    try {
      const r = await fetch('/api/wa/conversaciones');
      const data = await r.json();
      const list = document.getElementById('convList');
      
      if (!data.length) {
        list.innerHTML = '<div class="loading">Sin conversaciones aún.</div>';
        return;
      }

      list.innerHTML = data.map(c => {
        const telLimpio = c.telefono.replace('whatsapp:', '');
        const esActivo = c.telefono === telefonoActivo;
        const badgeNL = c.no_leidos > 0 ? `<span class="badge">${c.no_leidos}</span>` : '';
        const badgeAg = c.modo_agente ? `<span class="badge-agente">AGENTE</span>` : '';
        return `
          <div class="conv-item ${esActivo ? 'active' : ''}" onclick="cargarChat('${c.telefono}', '${c.nombre.replace(/'/g, "\\'")}')">
            <div class="avatar ${c.modo_agente ? 'agente' : ''}">👤</div>
            <div class="conv-info">
              <div class="nombre" style="display:flex;gap:6px;align-items:center">
                <span style="flex:1">${c.nombre}</span>${badgeAg}${badgeNL}
              </div>
              <div class="tel">${telLimpio}</div>
              <div class="ultimo">${c.ultimo_mensaje}</div>
            </div>
          </div>`;
      }).join('');
    } catch(e) {
      console.error('Error cargando conversaciones:', e);
    }
  }

  async function cargarChat(telefono, nombre) {
    telefonoActivo = telefono;
    nombreActivo = nombre;
    
    const title = document.getElementById('chatTitle');
    title.textContent = `💬 ${nombre} — ${telefono.replace('whatsapp:', '')}`;
    title.className = 'activo';

    const msgs = document.getElementById('chatMessages');
    msgs.innerHTML = '<div class="loading">Cargando mensajes...</div>';

    try {
      const r = await fetch(`/api/wa/mensajes/${encodeURIComponent(telefono)}`);
      const data = await r.json();

      if (!data.length) {
        msgs.innerHTML = '<div class="loading">Sin mensajes aún.</div>';
      } else {
        msgs.innerHTML = data.map(m => {
          const cls = m.origen === 'agente' ? 'agente' : (m.origen === 'bot' ? 'bot' : 'cliente');
          const label = m.origen === 'agente' ? 'Tú (agente)' : (m.origen === 'bot' ? '🤖 Bot' : 'Cliente');
          return `
            <div class="msg ${m.origen === 'agente' ? 'agente' : ''}">
              <div class="msg-bubble ${cls}">
                <div><span class="label ${cls}">${label}</span><span class="fecha">${m.fecha}</span></div>
                <div class="texto">${m.mensaje.replace(/\n/g, '<br>')}</div>
              </div>
            </div>`;
        }).join('');
        msgs.scrollTop = msgs.scrollHeight;
      }

      // Verificar modo agente
      const rConv = await fetch('/api/wa/conversaciones');
      const convs = await rConv.json();
      const conv = convs.find(c => c.telefono === telefono);
      const enModoAgente = conv ? conv.modo_agente : false;
      document.getElementById('badgeAgente').style.display = enModoAgente ? 'block' : 'none';
      document.getElementById('btnDevolver').style.display = enModoAgente ? 'inline-block' : 'none';

      cargarConversaciones();
    } catch(e) {
      msgs.innerHTML = `<div class="loading" style="color:red">Error: ${e.message}</div>`;
    }
  }

  async function enviarMensaje() {
    if (!telefonoActivo) return;
    const inp = document.getElementById('inputRespuesta');
    const mensaje = inp.value.trim();
    if (!mensaje) return;

    const status = document.getElementById('statusMsg');
    status.textContent = 'Enviando...';
    status.style.color = 'grey';

    try {
      const r = await fetch('/api/wa/enviar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telefono: telefonoActivo.replace('whatsapp:', ''), mensaje })
      });
      const data = await r.json();
      if (data.ok) {
        inp.value = '';
        status.textContent = '✅ Mensaje enviado';
        status.style.color = 'green';
        await cargarChat(telefonoActivo, nombreActivo);
      } else {
        status.textContent = `❌ Error: ${data.error}`;
        status.style.color = 'red';
      }
    } catch(e) {
      status.textContent = `❌ Error: ${e.message}`;
      status.style.color = 'red';
    }
    setTimeout(() => status.textContent = '', 4000);
  }

  async function devolverAlBot() {
    if (!telefonoActivo) return;
    try {
      await fetch(`/api/wa/devolver/${encodeURIComponent(telefonoActivo)}`, { method: 'POST' });
      document.getElementById('badgeAgente').style.display = 'none';
      document.getElementById('btnDevolver').style.display = 'none';
      document.getElementById('statusMsg').textContent = '✅ Cliente devuelto al bot';
      await cargarConversaciones();
    } catch(e) {
      document.getElementById('statusMsg').textContent = `❌ Error: ${e.message}`;
    }
  }

  // Enter para enviar, Shift+Enter para nueva línea
  document.getElementById('inputRespuesta').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviarMensaje();
    }
  });

  // Auto-refresh cada 15 segundos
  cargarConversaciones();
  setInterval(cargarConversaciones, 15000);
</script>
</body>
</html>
