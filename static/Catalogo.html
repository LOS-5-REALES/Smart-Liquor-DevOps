<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Smart-Liquor — Catálogo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0b0d0f; color: white; min-height: 100vh; }

  /* Header */
  .header { background: #0f1214; border-bottom: 1px solid #1a1d20; padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .header-title { font-size: 17px; font-weight: bold; }
  .header-sub { font-size: 11px; color: grey; }
  .badge-modo { font-size: 9px; font-weight: bold; padding: 4px 8px; border-radius: 5px; }
  .badge-ver { background: #0b2a1a; color: #a7f3d0; border: 1px solid #14532d; }
  .badge-pedido { background: #1a2a00; color: #fbbf24; border: 1px solid #854d0e; }
  .search-box { width: 100%; background: #111416; border: 1px solid #232629; border-radius: 10px; padding: 10px 14px; color: white; font-size: 14px; outline: none; }
  .search-box::placeholder { color: #555; }
  .search-box:focus { border-color: #fbbf24; }

  /* Grid productos */
  .productos { padding: 12px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
  .tarjeta { background: #0f1214; border: 1px solid #1a1d20; border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 12px; }
  .tarjeta-icon { width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .tarjeta-icon.ok { background: #1c2430; }
  .tarjeta-icon.low { background: #3a1010; }
  .tarjeta-info { flex: 1; min-width: 0; }
  .tarjeta-nombre { font-size: 14px; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tarjeta-precio { font-size: 13px; color: #fbbf24; font-weight: 600; margin-top: 2px; }
  .tarjeta-stock { font-size: 10px; color: grey; margin-top: 2px; }
  .tarjeta-controles { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .btn-qty { background: none; border: none; cursor: pointer; font-size: 22px; line-height: 1; padding: 4px; }
  .btn-qty.minus { color: #888; }
  .btn-qty.plus { color: #fbbf24; }
  .qty-txt { font-size: 15px; font-weight: bold; color: #fbbf24; min-width: 20px; text-align: center; }

  /* Sin stock */
  .sin-stock { opacity: 0.4; }

  /* Carrito flotante */
  .carrito { position: fixed; bottom: 0; left: 0; right: 0; background: #0f1214; border-top: 1px solid #1a1d20; padding: 12px 16px; display: none; z-index: 200; }
  .carrito.visible { display: block; }
  .btn-checkout { width: 100%; background: #1e7e34; color: white; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-checkout:active { background: #155724; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: grey; font-style: italic; }
  .error { text-align: center; padding: 20px; color: #f87171; background: #2a1010; border-radius: 8px; margin: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">🍾 Smart-Liquor Express</div>
      <div class="header-sub">Chincha</div>
    </div>
    <div id="badgeModo" class="badge-modo badge-ver">SOLO LECTURA 👀</div>
  </div>
  <input class="search-box" type="text" placeholder="🔍 Buscar licor o bebida..." id="searchInput" oninput="filtrar()">
</div>

<div class="productos" id="listaProductos">
  <div class="loading">Cargando catálogo...</div>
</div>

<div class="carrito" id="carritoBar">
  <button class="btn-checkout" onclick="confirmarPedido()">
    🛒 <span id="carritoTxt">Confirmar Pedido</span>
  </button>
</div>

<script>
  const params   = new URLSearchParams(window.location.search);
  const telefono = params.get('telefono') || '';
  const modo     = params.get('modo') || 'ver';
  const esPedido = modo === 'pedido';

  let productos  = [];
  let carrito    = {}; // { id: { nombre, precio, cantidad } }

  // Modo badge
  if (esPedido) {
    document.getElementById('badgeModo').textContent = 'MODO PEDIDO 🛒';
    document.getElementById('badgeModo').className = 'badge-modo badge-pedido';
  }

  async function cargarProductos() {
    try {
      const r = await fetch('/api/catalogo/productos');
      const data = await r.json();
      if (data.error) throw new Error(data.error);
      productos = data;
      renderProductos(productos);
    } catch(e) {
      document.getElementById('listaProductos').innerHTML =
        `<div class="error">⚠️ Error al cargar: ${e.message}</div>`;
    }
  }

  function renderProductos(lista) {
    const container = document.getElementById('listaProductos');
    if (!lista.length) {
      container.innerHTML = '<div class="loading">No se encontraron productos.</div>';
      return;
    }
    container.innerHTML = lista.map(p => {
      const enCarrito = carrito[p.id] ? carrito[p.id].cantidad : 0;
      const stockOk   = (p.stock_actual || 0) > 0;
      const iconClass = (p.stock_actual || 0) > (p.stock_minimo || 10) ? 'ok' : 'low';

      const controles = esPedido && stockOk ? `
        <div class="tarjeta-controles">
          <button class="btn-qty minus" onclick="cambiarCantidad(${p.id}, -1)">−</button>
          <span class="qty-txt" id="qty-${p.id}">${enCarrito || ''}</span>
          <button class="btn-qty plus" onclick="cambiarCantidad(${p.id}, 1)">+</button>
        </div>` : '';

      return `
        <div class="tarjeta ${!stockOk ? 'sin-stock' : ''}">
          <div class="tarjeta-icon ${iconClass}">🍾</div>
          <div class="tarjeta-info">
            <div class="tarjeta-nombre">${p.nombre}</div>
            <div class="tarjeta-precio">S/ ${parseFloat(p.precio_venta || 0).toFixed(2)}</div>
            <div class="tarjeta-stock">${stockOk ? `Disponibles: ${p.stock_actual} uds` : '⚠️ Sin stock'}</div>
          </div>
          ${controles}
        </div>`;
    }).join('');
  }

  function filtrar() {
    const termino = document.getElementById('searchInput').value.toLowerCase();
    const filtrados = termino
      ? productos.filter(p => p.nombre.toLowerCase().includes(termino))
      : productos;
    renderProductos(filtrados);
  }

  function cambiarCantidad(id, delta) {
    const prod = productos.find(p => p.id === id);
    if (!prod) return;

    const actual = carrito[id] ? carrito[id].cantidad : 0;
    const nueva  = actual + delta;

    if (nueva <= 0) {
      delete carrito[id];
    } else if (nueva <= 50 && nueva <= (prod.stock_actual || 0)) {
      carrito[id] = {
        nombre:   prod.nombre,
        precio:   parseFloat(prod.precio_venta || 0),
        cantidad: nueva,
      };
    }

    // Actualizar contador visual
    const el = document.getElementById(`qty-${id}`);
    if (el) el.textContent = carrito[id] ? carrito[id].cantidad : '';

    actualizarCarrito();
  }

  function actualizarCarrito() {
    const items      = Object.values(carrito);
    const totalItems = items.reduce((s, i) => s + i.cantidad, 0);
    const totalPrecio= items.reduce((s, i) => s + i.precio * i.cantidad, 0);
    const bar        = document.getElementById('carritoBar');

    if (totalItems > 0 && esPedido) {
      bar.className = 'carrito visible';
      document.getElementById('carritoTxt').textContent =
        `${totalItems} item(s) — S/ ${totalPrecio.toFixed(2)}  |  Confirmar Pedido`;
    } else {
      bar.className = 'carrito';
    }
  }

  function confirmarPedido() {
    const items = Object.entries(carrito);
    if (!items.length) return;

    const lineas = items.map(([id, item]) =>
      `PEDIDO_WEB:ID=${id}|CANT=${item.cantidad}`
    ).join('\n');

    const encoded    = encodeURIComponent(lineas);
    const urlWA      = `https://wa.me/14155238886?text=${encoded}`;
    window.location.href = urlWA;
  }

  cargarProductos();
</script>
</body>
</html>
